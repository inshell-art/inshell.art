name: deploy-pages

on:
  workflow_dispatch:
    inputs:
      target:
        description: Pages app to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - home
          - thought
      branch:
        description: Cloudflare Pages deployment branch
        required: true
        default: staging
        type: choice
        options:
          - staging
          - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-pages-${{ github.event.inputs.target }}-${{ github.event.inputs.branch }}
  cancel-in-progress: false

jobs:
  deploy-home:
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'home' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_PROJECT_HOME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_HOME || 'inshell-art' }}
      VITE_DEPLOY_ENV: ${{ github.event.inputs.branch == 'staging' && 'preview' || 'production' }}
      VITE_NETWORK: ${{ vars.VITE_NETWORK || 'sepolia' }}
      VITE_ETH_RPC: ${{ github.event.inputs.branch == 'staging' && '/api/path-rpc' || vars.VITE_ETH_RPC || '/api/path-rpc' }}
      VITE_WALLET_CHAIN_RPC_URL: ${{ vars.VITE_WALLET_CHAIN_RPC_URL || 'https://ethereum-sepolia-rpc.publicnode.com' }}
      VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}
      VITE_PUBLIC_LAUNCH_MODE: ${{ vars.VITE_PUBLIC_LAUNCH_MODE || 'sepolia_invite' }}
      VITE_REPORT_BUG_URL: ${{ vars.VITE_REPORT_BUG_URL || 'https://github.com/inshell-art/inshell.art/issues/new?template=sepolia-bug.md' }}
      VITE_GITHUB_URL: ${{ vars.VITE_GITHUB_URL || 'https://github.com/inshell-art/' }}
      VITE_DEBUG_PANEL: ${{ vars.VITE_DEBUG_PANEL || 'off' }}
      VITE_THOUGHT_URL: ${{ github.event.inputs.branch == 'staging' && 'https://thought.preview.inshell.art/' || vars.VITE_THOUGHT_URL || 'https://thought.inshell.art/' }}
      VITE_GALLERY_URL: ${{ github.event.inputs.branch == 'staging' && 'https://gallery.preview.inshell.art/' || vars.VITE_GALLERY_URL || vars.VITE_THOUGHT_GALLERY_URL || 'https://gallery.inshell.art/' }}
      VITE_THOUGHT_GALLERY_URL: ${{ github.event.inputs.branch == 'staging' && 'https://gallery.preview.inshell.art/' || vars.VITE_GALLERY_URL || vars.VITE_THOUGHT_GALLERY_URL || 'https://gallery.inshell.art/' }}
      VITE_PUBLIC_TELEGRAM_CHANNEL_URL: ${{ vars.VITE_PUBLIC_TELEGRAM_CHANNEL_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Enable pnpm
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check deploy config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_PAGES_PROJECT_HOME"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$VITE_ETH_RPC"
          test -n "$VITE_WALLET_CHAIN_RPC_URL"
          test -n "$VITE_THOUGHT_URL"
          test -n "$VITE_GALLERY_URL"
      - name: Validate deployment gates
        run: pnpm run check:deployment
      - name: Lint home
        run: pnpm --filter @inshell/home lint
      - name: Test home launch surface
        run: pnpm run test:presepolia
      - name: Build home
        run: pnpm run build:home
      - name: Deploy home to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.94.0 pages deploy dist/home --project-name="$CLOUDFLARE_PAGES_PROJECT_HOME" --branch="${{ github.event.inputs.branch }}"

  deploy-thought:
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'thought' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_PROJECT_THOUGHT: ${{ vars.CLOUDFLARE_PAGES_PROJECT_THOUGHT || 'thought-inshell-art' }}
      VITE_DEPLOY_ENV: ${{ github.event.inputs.branch == 'staging' && 'preview' || 'production' }}
      VITE_NETWORK: ${{ vars.VITE_NETWORK || 'sepolia' }}
      VITE_ETH_RPC: ${{ github.event.inputs.branch == 'staging' && '/api/path-rpc' || vars.VITE_ETH_RPC || '/api/path-rpc' }}
      VITE_THOUGHT_RPC_URL: ${{ github.event.inputs.branch == 'staging' && '/api/thought-rpc' || vars.VITE_THOUGHT_RPC_URL || '/api/thought-rpc' }}
      VITE_THOUGHT_PREVIEW_ENDPOINT_ENABLED: ${{ vars.VITE_THOUGHT_PREVIEW_ENDPOINT_ENABLED || 'true' }}
      VITE_THOUGHT_PREVIEW_ENDPOINT_URL: ${{ github.event.inputs.branch == 'staging' && '/api/thought-preview' || vars.VITE_THOUGHT_PREVIEW_ENDPOINT_URL || '/api/thought-preview' }}
      VITE_WALLET_CHAIN_RPC_URL: ${{ vars.VITE_WALLET_CHAIN_RPC_URL || 'https://ethereum-sepolia-rpc.publicnode.com' }}
      VITE_PATH_MINT_URL: ${{ github.event.inputs.branch == 'staging' && 'https://preview.inshell.art' || vars.VITE_PATH_MINT_URL || 'https://inshell.art' }}
      VITE_THOUGHT_DETAIL_BASE_URL: ${{ github.event.inputs.branch == 'staging' && 'https://preview.inshell.art' || vars.VITE_THOUGHT_DETAIL_BASE_URL || 'https://inshell.art' }}
      VITE_GALLERY_URL: ${{ github.event.inputs.branch == 'staging' && 'https://gallery.preview.inshell.art/' || vars.VITE_GALLERY_URL || vars.VITE_THOUGHT_GALLERY_URL || 'https://gallery.inshell.art/' }}
      VITE_THOUGHT_GALLERY_URL: ${{ github.event.inputs.branch == 'staging' && 'https://gallery.preview.inshell.art/' || vars.VITE_GALLERY_URL || vars.VITE_THOUGHT_GALLERY_URL || 'https://gallery.inshell.art/' }}
      VITE_THOUGHT_EXPLORER_BASE_URL: ${{ vars.VITE_THOUGHT_EXPLORER_BASE_URL || 'https://sepolia.etherscan.io' }}
      VITE_PUBLIC_LAUNCH_MODE: ${{ vars.VITE_PUBLIC_LAUNCH_MODE || 'sepolia_invite' }}
      VITE_REPORT_BUG_URL: ${{ vars.VITE_REPORT_BUG_URL || 'https://github.com/inshell-art/inshell.art/issues/new?template=sepolia-bug.md' }}
      VITE_GITHUB_URL: ${{ vars.VITE_GITHUB_URL || 'https://github.com/inshell-art/' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Enable pnpm
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check deploy config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_PAGES_PROJECT_THOUGHT"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$VITE_ETH_RPC"
          test -n "$VITE_THOUGHT_RPC_URL"
          test -n "$VITE_THOUGHT_PREVIEW_ENDPOINT_ENABLED"
          test -n "$VITE_THOUGHT_PREVIEW_ENDPOINT_URL"
          test -n "$VITE_WALLET_CHAIN_RPC_URL"
          test -n "$VITE_PATH_MINT_URL"
          test -n "$VITE_THOUGHT_DETAIL_BASE_URL"
          test -n "$VITE_GALLERY_URL"
      - name: Validate deployment gates
        run: pnpm run check:deployment
      - name: Test THOUGHT runtime payloads
        run: pnpm run test:thought-runtime
      - name: Type-check THOUGHT
        run: pnpm --filter @inshell/thought type-check
      - name: Build THOUGHT
        run: pnpm --filter @inshell/thought build
      - name: Deploy THOUGHT to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.94.0 pages deploy dist/thought --project-name="$CLOUDFLARE_PAGES_PROJECT_THOUGHT" --branch="${{ github.event.inputs.branch }}"
