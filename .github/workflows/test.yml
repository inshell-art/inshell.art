name: test

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Enable pnpm
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate deployment gates
        run: pnpm run check:deployment
      - name: Run linter
        run: pnpm run lint
      - name: Run type-check
        run: pnpm run type-check
      - name: Run tests
        run: pnpm run test:presepolia
      - name: Test THOUGHT runtime payloads
        run: pnpm run test:thought-runtime
      - name: Build home
        run: pnpm run build:home
      - name: Build THOUGHT
        run: pnpm run build:thought

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install gitleaks
        run: |
          mkdir -p "$RUNNER_TEMP/gitleaks"
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o "$RUNNER_TEMP/gitleaks/gitleaks.tar.gz"
          tar -xzf "$RUNNER_TEMP/gitleaks/gitleaks.tar.gz" -C "$RUNNER_TEMP/gitleaks" gitleaks
      - name: Run gitleaks
        run: |
          "$RUNNER_TEMP/gitleaks/gitleaks" detect --no-git --redact --no-banner
